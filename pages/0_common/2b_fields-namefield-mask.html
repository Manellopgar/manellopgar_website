<h2>Custom Name Field</h2>
<p><strong>Custom Name Field:</strong> Enter your custom field name here if you intend to use it with a specific named configuration.</p>

<h2>Field Mask</h2>
<p><strong>Field Mask:</strong> This option is enabled by default. To utilize a <em>Custom Name Field</em> as the Field Mask, you must activate the <strong>Input Attribute Toggle</strong>.</p>
