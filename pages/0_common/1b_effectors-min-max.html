<h3>Min/Max Parameters</h3>

<ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
  <li><strong>Show Min/Max Settings</strong>: Toggle the visibility of Minimum and Maximum controls.</li>

  <li><strong>Minimum</strong>: Adjust the Minimum value to increase or decrease the Range Effector values.</li>

  <li><strong>Maximum</strong>: Adjust the Maximum value to increase or decrease the Range Effector values.</li>
</ul>
